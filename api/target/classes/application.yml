server:
  port: 8080

spring:
  application:
    name: redis-usage-api

  datasource:
    url: jdbc:postgresql://${DB_HOST:localhost}:${DB_PORT:5432}/${DB_NAME:app}
    username: ${DB_USER:app}
    password: ${DB_PASSWORD:app}

  jpa:
    hibernate:
      ddl-auto: update

  data:
    redis:
      host: ${REDIS_HOST:localhost}
      port: ${REDIS_PORT:6379}

  session:
    timeout: 30m

management:
  endpoints:
    web:
      exposure:
        include: health,info,metrics

app:
  redis:
    stream:
      orders: orders.stream
      consumerGroup: orders.cg
      jobs: jobs.stream
